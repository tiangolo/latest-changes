name: Docker Deploy

on:
  push:
    branches:
      - main
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish, for example 0.5.0
        required: false

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to DockerHub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            tiangolo/latest-changes:latest
            ghcr.io/tiangolo/latest-changes:latest
          file: base.dockerfile
      - name: Build and push tag
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            tiangolo/latest-changes:${{ github.event.release.tag_name || github.event.inputs.tag }}
            ghcr.io/tiangolo/latest-changes:${{ github.event.release.tag_name || github.event.inputs.tag }}
          file: base.dockerfile
